<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlaxiPulse</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

:root{
--bg:#050000;
--panel:#120000;
--panel2:#1a0000;
--accent:#ff3333;
--accent2:#ff5555;
--text:#ffffff;
--muted:#bdbdbd;
}

body{
background:linear-gradient(135deg,#050000,#120000);
height:100dvh;
overflow:hidden;
color:var(--text);
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
opacity:0;
pointer-events:none;
transition:.35s;
z-index:90;
}

.overlay.active{
opacity:1;
pointer-events:auto;
}

.sidebar{
position:fixed;
left:-290px;
top:0;
width:280px;
height:100%;
background:rgba(26,0,0,.98);
backdrop-filter:blur(15px);
border-right:1px solid rgba(255,51,51,.25);
padding:20px;
transition:.4s ease;
z-index:100;
overflow-y:auto;
}

.sidebar.open{
left:0;
}

.logo{
font-size:26px;
font-weight:800;
margin-bottom:30px;
color:var(--accent);
}

.section-title{
font-size:12px;
text-transform:uppercase;
letter-spacing:2px;
color:#ff8888;
margin-bottom:10px;
}

.sidebar-section{
margin-bottom:25px;
}

.channel,
.add-dm,
.auth-btn{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:12px;
background:#220000;
color:white;
cursor:pointer;
transition:.25s;
text-align: left;
}

.channel:hover,
.add-dm:hover,
.auth-btn:hover {
background:#330000;
}

.channel.active{
background:var(--accent);
}

.main{
display:flex;
flex-direction:column;
height:100dvh;
}

.topbar{
height:70px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
background:#100000;
border-bottom:1px solid rgba(255,51,51,.2);
}

.menu-btn{
background:var(--accent);
border:none;
padding:10px 16px;
border-radius:10px;
color:white;
cursor:pointer;
font-weight:700;
}

.chat-title{
font-size:18px;
font-weight:700;
}

.premium-badge{
background:linear-gradient(45deg,#ff3333,#ff6666);
padding:8px 12px;
border-radius:999px;
font-size:12px;
font-weight:700;
}

.chat-container{
flex:1;
overflow-y:auto;
padding:25px;
display:flex;
flex-direction:column;
gap:15px;
scroll-behavior:smooth;
}

.message{
max-width:80%;
padding:14px;
border-radius:16px;
animation:fade .25s ease;
}

.message.self{
align-self:flex-end;
background:var(--accent);
}

.message.other{
align-self:flex-start;
background:#220000;
}

.sender{
font-size:12px;
font-weight:700;
margin-bottom:5px;
color:#ff9999;
}

.input-area{
padding:18px;
display:flex;
gap:10px;
background:#100000;
border-top:1px solid rgba(255,51,51,.2);
}

.input-area input{
flex:1;
padding:14px;
background:#1a0000;
border:1px solid rgba(255,51,51,.25);
border-radius:12px;
color:white;
outline:none;
}

#sendBtn{
background:var(--accent);
border:none;
padding:14px 20px;
border-radius:12px;
cursor:pointer;
font-weight:700;
color:white;
}

.auth-modal{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.7);
z-index:200;
}

.auth-box{
background:#180000;
width:95%;
max-width:420px;
padding:25px;
border-radius:20px;
position:relative;
border: 1px solid rgba(255,51,51,.2);
}

.auth-box h2{
margin-bottom:20px;
text-align: center;
}

.auth-box input{
width:100%;
padding:14px;
margin-bottom:12px;
background:#250000;
border:none;
border-radius:12px;
color:white;
}

.auth-submit{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:var(--accent);
color:white;
font-weight:700;
cursor:pointer;
}

.google-btn {
width:100%;
padding:14px;
margin-bottom:12px;
background:#ffffff;
color:#000000;
border:none;
border-radius:12px;
font-weight:700;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:.25s;
}

.google-btn:hover {
background:#eeeeee;
}

.close-auth{
position:absolute;
right:15px;
top:15px;
background:none;
border:none;
color:white;
font-size:20px;
cursor:pointer;
}

@keyframes fade{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

@media(max-width:768px){
.chat-title{font-size:15px;}
.message{max-width:90%;}
.input-area{padding:12px;}
.sidebar{width:260px;}
}
</style>
</head>
<body>

<div class="overlay" id="overlay"></div>

<aside class="sidebar" id="sidebar">
<div class="logo">⚡ GlaxiPulse</div>

<div class="sidebar-section">
<div class="section-title">Channels</div>
<button class="channel active" id="lobbyBtn" onclick="switchChat('lobby')">🌎 Public Lobby</button>
<div id="dmList"></div>
<button class="add-dm" onclick="addDM()">＋ New DM</button>
</div>

<div class="sidebar-section">
<div class="section-title">Account</div>
<button class="auth-btn" id="loginMenuBtn" onclick="openAuth('login')">Login / Status</button>
</div>
</aside>

<div class="main">
<header class="topbar">
<button id="menuBtn" class="menu-btn">☰ Menu</button>
<div class="chat-title" id="chatTitle">🌎 Public Lobby</div>
<div class="premium-badge">PREMIUM</div>
</header>

<div class="chat-container" id="chatContainer"></div>

<div class="input-area">
<input type="text" id="messageInput" placeholder="Type your message...">
<button id="sendBtn">Send</button>
</div>
</div>

<div class="auth-modal" id="authModal">
<div class="auth-box">
<button class="close-auth" onclick="closeAuth()">✕</button>
<h2 id="authTitle">Welcome to GlaxiPulse</h2>

<button class="google-btn" onclick="loginWithGoogle()">
<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G" style="width:20px;height:20px;margin-right:10px;">
Continue with Google
</button>

<div style="text-align:center; margin:15px 0; color:var(--muted); font-size:12px;">OR USE EMAIL</div>

<input type="email" id="authEmail" placeholder="Email">
<input type="password" id="authPassword" placeholder="Password">
<button class="auth-submit" onclick="handleEmailAuth()">Continue</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getDatabase, ref, push, onValue, off } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyC0J0T4yUE_YPKM9Zso45he68f3paIvTP0",
authDomain: "atsenor-database.firebaseapp.com",
databaseURL: "https://atsenor-database-default-rtdb.firebaseio.com",
projectId: "atsenor-database",
storageBucket: "atsenor-database.appspot.com",
messagingSenderId: "839318291940",
appId: "1:839318291940:web:1dee491a259861c7ebf3f1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);
const googleProvider = new GoogleAuthProvider();

const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");
const menuBtn = document.getElementById("menuBtn");
const sendBtn = document.getElementById("sendBtn");
const messageInput = document.getElementById("messageInput");
const chatContainer = document.getElementById("chatContainer");
const chatTitle = document.getElementById("chatTitle");
const authModal = document.getElementById("authModal");
const authTitle = document.getElementById("authTitle");

let currentChat = "lobby";
let currentUser = null;
let currentDbRef = null;

//AuthState Listener
onAuthStateChanged(auth, (user) => {
if (user) {
currentUser = user;
document.getElementById("loginMenuBtn").textContent = "Logged in: " + (user.displayName || user.email.split('@')[0]);
closeAuth();
listenToChat(currentChat);
} else {
currentUser = null;
document.getElementById("loginMenuBtn").textContent = "Login / Register";
openAuth('login');
}
});

function listenToChat(chatId) {
if (currentDbRef) off(currentDbRef);

// Fixed: Removed backslashes to allow string interpolation
let dbPath = chatId === "lobby" ? 'messages/public' : `messages/dms/${chatId}`;
currentDbRef = ref(db, dbPath);

onValue(currentDbRef, (snapshot) => {
chatContainer.innerHTML = "";
if (chatId === "lobby") {
appendMessage("System", "Welcome to GlaxiPulse. Premium Dark Red Chat Ready.", false);
}

snapshot.forEach((childSnapshot) => {
const data = childSnapshot.val();
const isSelf = currentUser && data.uid === currentUser.uid;
appendMessage(data.sender, data.text, isSelf);
});
autoScroll();
});
}

function appendMessage(sender, text, isSelf) {
const div = document.createElement("div");
div.className = isSelf ? "message self" : "message other";
// Fixed: Removed backslashes to allow layout rendering
div.innerHTML = `
<div class="sender">${isSelf ? "You" : sender}</div>
${text}
`;
chatContainer.appendChild(div);
}

function sendMessage() {
const text = messageInput.value.trim();
if (!text) return;

// Fixed: Added critical return statement to prevent crashing
if (!currentUser) {
alert("Please log in to send messages!");
openAuth('login');
return; 
}

// Fixed: Removed backslashes to correctly differentiate lobbies and dms
let dbPath = currentChat === "lobby" ? 'messages/public' : `messages/dms/${currentChat}`;
push(ref(db, dbPath), {
text: text,
sender: currentUser.displayName || currentUser.email.split('@')[0],
uid: currentUser.uid,
timestamp: Date.now()
});

messageInput.value = "";
}

function loginWithGoogle() {
signInWithPopup(auth, googleProvider)
.then(() => console.log("Logged in!"))
.catch((err) => alert("Error: " + err.message));
}

function handleEmailAuth() {
const email = document.getElementById("authEmail").value.trim();
const password = document.getElementById("authPassword").value.trim();

if (!email || !password) {
alert("Please fill all fields!");
return;
}

if (authTitle.textContent === "Login") {
signInWithEmailAndPassword(auth, email, password).catch(err => alert(err.message));
} else {
createUserWithEmailAndPassword(auth, email, password).catch(err => alert(err.message));
}
}

function switchChat(id, name = "Public Lobby") {
currentChat = id;
chatTitle.textContent = id === "lobby" ? "🌎 Public Lobby" : "💬 " + name;

document.querySelectorAll('.channel').forEach(btn => btn.classList.remove('active'));
if(id === 'lobby') document.getElementById('lobbyBtn').classList.add('active');

listenToChat(id);
sidebar.classList.remove("open");
overlay.classList.remove("active");
}

function addDM() {
// ১. প্রথমে একটি গোপন রুম কোড চাইবে যা আপনি ও আপনার বন্ধু দুজনেই এক লিখবেন
const roomCode = prompt("Enter a Secret Room Code (e.g., ahsan_and_rafi):");
if (!roomCode) return;

// ২. চ্যাটে আপনার বন্ধুর কী নাম দেখাবে তা লিখুন
const name = prompt("Enter friend's display name:");
if (!name) return;

// স্পেস বা খালি জায়গা থাকলে তা কেটে আইডি তৈরি করবে
const id = "dm_" + roomCode.replace(/\s+/g, '_').toLowerCase();

const btn = document.createElement("button");
btn.className = "channel";
btn.innerHTML = "💬 " + name;
btn.onclick = () => switchChat(id, name);

document.getElementById("dmList").appendChild(btn);
switchChat(id, name);
}
  

function openAuth(type) {
authModal.style.display = "flex";
authTitle.textContent = type === "login" ? "Login" : "Register";
}

function closeAuth() {
authModal.style.display = "none";
}

function autoScroll() {
chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: "smooth" });
}

menuBtn.addEventListener("click", () => {
sidebar.classList.toggle("open");
overlay.classList.toggle("active");
});

overlay.addEventListener("click", () => {
sidebar.classList.remove("open");
overlay.classList.remove("active");
});

sendBtn.addEventListener("click", sendMessage);
messageInput.addEventListener("keydown", (e) => {
if (e.key === "Enter") sendMessage();
});

// Mapping triggers to window object
window.openAuth = openAuth;
window.closeAuth = closeAuth;
window.loginWithGoogle = loginWithGoogle;
window.handleEmailAuth = handleEmailAuth;
window.addDM = addDM;
window.switchChat = switchChat;
</script>
</body>
</html>
