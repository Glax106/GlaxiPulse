<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlaxiPulse</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* PASTE PART 2 CSS HERE */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

:root{
--bg:#050000;
--panel:#120000;
--panel2:#1a0000;
--accent:#ff3333;
--accent2:#ff5555;
--text:#ffffff;
--muted:#bdbdbd;
}

body{
background:linear-gradient(135deg,#050000,#120000);
height:100vh;
overflow:hidden;
color:var(--text);
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
opacity:0;
pointer-events:none;
transition:.35s;
z-index:90;
}

.overlay.active{
opacity:1;
pointer-events:auto;
}

.sidebar{
position:fixed;
left:-290px;
top:0;
width:280px;
height:100%;
background:rgba(26,0,0,.98);
backdrop-filter:blur(15px);
border-right:1px solid rgba(255,51,51,.25);
padding:20px;
transition:.4s ease;
z-index:100;
overflow-y:auto;
}

.sidebar.open{
left:0;
}

.logo{
font-size:26px;
font-weight:800;
margin-bottom:30px;
color:var(--accent);
}

.section-title{
font-size:12px;
text-transform:uppercase;
letter-spacing:2px;
color:#ff8888;
margin-bottom:10px;
}

.sidebar-section{
margin-bottom:25px;
}

.channel,
.add-dm,
.auth-btn{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:12px;
background:#220000;
color:white;
cursor:pointer;
transition:.25s;
}

.channel:hover,
.add-dm:hover,
.auth-btn:hover

.channel.active{
background:var(--accent);
}

.main{
display:flex;
flex-direction:column;
height:100vh;
}

.topbar{
height:70px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
background:#100000;
border-bottom:1px solid rgba(255,51,51,.2);
}

.menu-btn{
background:var(--accent);
border:none;
padding:10px 16px;
border-radius:10px;
color:white;
cursor:pointer;
font-weight:700;
}

.chat-title{
font-size:18px;
font-weight:700;
}

.premium-badge{
background:linear-gradient(45deg,#ff3333,#ff6666);
padding:8px 12px;
border-radius:999px;
font-size:12px;
font-weight:700;
}

.chat-container{
flex:1;
overflow-y:auto;
padding:25px;
display:flex;
flex-direction:column;
gap:15px;
scroll-behavior:smooth;
}

.message{
max-width:80%;
padding:14px;
border-radius:16px;
animation:fade .25s ease;
}

.message.self{
align-self:flex-end;
background:var(--accent);
}

.message.other{
align-self:flex-start;
background:#220000;
}

.sender{
font-size:12px;
font-weight:700;
margin-bottom:5px;
color:#ff9999;
}

.input-area{
padding:18px;
display:flex;
gap:10px;
background:#100000;
border-top:1px solid rgba(255,51,51,.2);
}

.input-area input{
flex:1;
padding:14px;
background:#1a0000;
border:1px solid rgba(255,51,51,.25);
border-radius:12px;
color:white;
outline:none;
}

#sendBtn{
background:var(--accent);
border:none;
padding:14px 20px;
border-radius:12px;
cursor:pointer;
font-weight:700;
color:white;
}

.auth-modal{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.7);
z-index:200;
}

.auth-box{
background:#180000;
width:95%;
max-width:420px;
padding:25px;
border-radius:20px;
position:relative;
}

.auth-box h2{
margin-bottom:20px;
}

.auth-box input{
width:100%;
padding:14px;
margin-bottom:12px;
background:#250000;
border:none;
border-radius:12px;
color:white;
}

.auth-submit{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:var(--accent);
color:white;
font-weight:700;
}

.close-auth{
position:absolute;
right:15px;
top:15px;
background:none;
border:none;
color:white;
font-size:20px;
cursor:pointer;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@media(max-width:768px){

.chat-title{
font-size:15px;
}

.message{
max-width:90%;
}

.input-area{
padding:12px;
}

.sidebar{
width:260px;
}

}

/*end*/

</style>

</head>
<body>

<div class="overlay" id="overlay"></div>

<!-- Sidebar -->

<aside class="sidebar" id="sidebar">

<div class="logo">
⚡ GlaxiPulse
</div>

<div class="sidebar-section">
<div class="section-title">Channels</div>

<button class="channel active" onclick="switchChat('lobby')">
🌎 Public Lobby
</button>

<div id="dmList"></div>

<button class="add-dm" onclick="addDM()">
＋ New DM
</button>
</div>

<div class="sidebar-section">
<div class="section-title">Account</div>

<button class="auth-btn" onclick="openAuth('login')">
Login
</button>

<button class="auth-btn" onclick="openAuth('register')">
Register
</button>
</div>

</aside>

<!-- Main -->

<div class="main">

<header class="topbar">

<button id="menuBtn" class="menu-btn">
☰ Menu
</button>

<div class="chat-title" id="chatTitle">
🌎 Public Lobby
</div>

<div class="premium-badge">
PREMIUM
</div>

</header>

<div class="chat-container" id="chatContainer">

<div class="message other">
<div class="sender">System</div>
Welcome to GlaxiPulse.
</div>

<div class="message self">
<div class="sender">You</div>
Premium Dark Red Chat Ready.
</div>

</div>

<div class="input-area">

<input
type="text"
id="messageInput"
placeholder="Type your message..."

>

<button id="sendBtn">
Send
</button>

</div>

</div>

<!-- Auth Modal -->

<div class="auth-modal" id="authModal">

<div class="auth-box">

<button class="close-auth" onclick="closeAuth()">
✕
</button>

<h2 id="authTitle">
Login
</h2>

<input type="text" placeholder="Username">

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button class="auth-submit">
Continue
</button>

</div>

</div>

<script>

/* PASTE PART 3 JS HERE */
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");
const menuBtn = document.getElementById("menuBtn");

const sendBtn = document.getElementById("sendBtn");
const messageInput = document.getElementById("messageInput");
const chatContainer = document.getElementById("chatContainer");
const chatTitle = document.getElementById("chatTitle");

const authModal = document.getElementById("authModal");
const authTitle = document.getElementById("authTitle");

let currentChat = "lobby";

let chats = {
lobby:[]
};

menuBtn.addEventListener("click",()=>{
sidebar.classList.toggle("open");
overlay.classList.toggle("active");
});

overlay.addEventListener("click",()=>{
sidebar.classList.remove("open");
overlay.classList.remove("active");
});

function autoScroll(){
chatContainer.scrollTo({
top:chatContainer.scrollHeight,
behavior:"smooth"
});
}

function createMessage(text,self=true){

const div=document.createElement("div");

div.className=self
? "message self"
: "message other";

div.innerHTML=`

<div class="sender">
${self ? "You" : "Friend"}
</div>
${text}
`;

chatContainer.appendChild(div);

autoScroll();
}

function sendMessage(){

const text=messageInput.value.trim();

if(!text) return;

if(!chats[currentChat])
chats[currentChat]=[];

chats[currentChat].push(text);

createMessage(text,true);

messageInput.value="";


}

sendBtn.addEventListener("click",sendMessage);

messageInput.addEventListener("keydown",(e)=>{
if(e.key==="Enter"){
sendMessage();
}
});

function addDM(){

const name=prompt("Enter username");

if(!name) return;

const id="dm_"+Date.now();

chats[id]=[];

const btn=document.createElement("button");

btn.className="channel";

btn.innerHTML="💬 "+name;

btn.onclick=()=>{
switchChat(id,name);
};

document.getElementById("dmList").appendChild(btn);

switchChat(id,name);

}

function switchChat(id,name="Public Lobby"){

currentChat=id;

chatTitle.textContent=
id==="lobby"
? "🌎 Public Lobby"
: "💬 "+name;

chatContainer.innerHTML="";

if(chats[id]){

chats[id].forEach(msg=>{

const div=document.createElement("div");

div.className="message self";

div.innerHTML=`

<div class="sender">You</div>
${msg}
`;

chatContainer.appendChild(div);

});

}

autoScroll();

sidebar.classList.remove("open");
overlay.classList.remove("active");

}

function openAuth(type){

authModal.style.display="flex";

authTitle.textContent=
type==="login"
? "Login"
: "Register";

}

function closeAuth(){
authModal.style.display="none";
}

autoScroll();

/*end*/

</script>

</script>

</body>
